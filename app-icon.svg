<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="geometricPrecision">
  <!-- Dark rounded background — no beige border. -->
  <rect width="100" height="100" fill="#191919" rx="16" ry="16"/>
  <!-- Stylised G: thick C arc opening right + horizontal tongue. -->
  <g fill="#ffffff">
    <!-- C ring: outer + inner circles in even-odd fill creates a donut, then
         we mask the right side via the opening rectangle below. -->
    <path fill-rule="evenodd" d="M44 22a28 28 0 1 1 0 56 28 28 0 0 1 0-56zm0 14a14 14 0 1 0 0 28 14 14 0 0 0 0-28z"/>
    <!-- Cut the opening on the right side of the C. -->
    <rect x="44" y="36" width="34" height="28"/>
    <!-- The G's tongue bar (the horizontal block at middle-right inside the C). -->
    <rect x="44" y="44" width="30" height="12"/>
  </g>
  <!-- Orange accent square (top-right). -->
  <rect x="62" y="16" width="22" height="22" fill="#FF570C"/>
</svg>
